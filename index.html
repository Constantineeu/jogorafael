<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jogo da Memória</title>
<style>
body{
  font-family: Arial;
  text-align:center;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

h1{
  margin-top:20px;
  font-size:32px;
}

#menu{
  margin-top:30px;
}

#menu button{
  margin:10px;
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#38bdf8;
  color:#000;
  transition:0.3s;
}

#menu button:hover{
  background:#0ea5e9;
  transform:scale(1.05);
}

#topo{
  font-size:24px;
  margin:15px;
}

#tabuleiro{
  display:grid;
  justify-content:center;
  gap:10px;
  margin-top:20px;
}

.carta{
  width:80px;
  height:80px;
  perspective:600px;
}

.inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition: transform 0.5s;
}

.carta.virada .inner{
  transform: rotateY(180deg);
}

.frente, .verso{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:10px;
}

.frente{ background:#334155; }

.verso{
  transform: rotateY(180deg);
  background:white;
}

.verso img{
  width:100%; height:100%; border-radius:10px;
}

#rank{
  margin-top:30px;
  position:relative;
}

#resetBtn{
  position:absolute;
  top:0;
  right:0;
  font-size:10px;
  padding:3px 6px;
  cursor:pointer;
  background:#ef4444;
  border:none;
  color:white;
  border-radius:5px;
}

#resetBtn:hover{
  background:#dc2626;
}

</style>
</head>
<body>

<h1>⚽ Jogo da Memória Futebol</h1>

<div id="menu">
  <button onclick="iniciar('facil')">Fácil</button>
  <button onclick="iniciar('medio')">Médio</button>
  <button onclick="iniciar('dificil')">Difícil</button>
</div>

<div id="topo"></div>
<div id="tabuleiro"></div>

<div id="rank">
  <h2>🏆 Ranking</h2>
  <button id="resetBtn" onclick="resetarRank()">reset</button>
  <table id="rankTable" border="1" style="margin:auto; background:white; color:black"></table>
</div>

<script>
let primeira=null
let segunda=null
let travado=false
let pontos=0
let tempo=0
let intervalo
let dificuldadeAtual
let jogadorNome=""

function iniciar(nivel){
  dificuldadeAtual=nivel
  document.getElementById("tabuleiro").innerHTML=""

  if(nivel==='facil'){
    tempo=60
    criarCartas(8,4)
  }
  if(nivel==='medio'){
    tempo=50
    criarCartas(12,4)
  }
  if(nivel==='dificil'){
    jogadorNome=prompt("Digite seu nome:")
    tempo=40
    pontos=0
    criarCartasDificil()
  }

  iniciarTimer()
}

function iniciarTimer(){
  clearInterval(intervalo)
  intervalo=setInterval(()=>{
    tempo--
    document.getElementById("topo").innerText="Tempo: "+tempo+"s" + (dificuldadeAtual==='dificil' ? " | Pontos: "+pontos : "")

    if(tempo<=0){
      clearInterval(intervalo)
      alert("Tempo acabou!")
      if(dificuldadeAtual==='dificil'){
        salvarRank(jogadorNome,pontos,tempo)
      }
    }
  },1000)
}

function criarCartas(qtd, colunas){
  let tab=document.getElementById("tabuleiro")
  tab.style.gridTemplateColumns=`repeat(${colunas},80px)`

  let imagens=[]
  for(let i=1;i<=qtd/2;i++){
    imagens.push(i,i)
  }

  imagens.sort(()=>Math.random()-0.5)

  imagens.forEach(id=>{
    let carta=document.createElement("div")
    carta.className="carta"
    carta.innerHTML=`
      <div class="inner">
        <div class="frente"></div>
        <div class="verso"><img src="img/${id}.png"></div>
      </div>
    `

    carta.onclick=()=>virar(carta,id)
    tab.appendChild(carta)
  })
}

function criarCartasDificil(){
  let tab=document.getElementById("tabuleiro")
  tab.style.gridTemplateColumns=`repeat(5,80px)`

  let cartas=[
    {id:'j1', pontos:100},{id:'j1', pontos:100},
    {id:'j2', pontos:100},{id:'j2', pontos:100},

    {id:'m1', pontos:80},{id:'m1', pontos:80},
    {id:'m2', pontos:80},{id:'m2', pontos:80},
    {id:'m3', pontos:80},{id:'m3', pontos:80},

    {id:'i1', pontos:40},{id:'i1', pontos:40},
    {id:'i2', pontos:40},{id:'i2', pontos:40},
    {id:'i3', pontos:40},{id:'i3', pontos:40},
    {id:'i4', pontos:40},{id:'i4', pontos:40}
  ]

  cartas.sort(()=>Math.random()-0.5)

  cartas.forEach(c=>{
    let carta=document.createElement("div")
    carta.className="carta"
    carta.innerHTML=`
      <div class="inner">
        <div class="frente"></div>
        <div class="verso"><img src="img/${c.id}.png"></div>
      </div>
    `

    carta.onclick=()=>virarDificil(carta,c)
    tab.appendChild(carta)
  })
}

function virar(carta,id){
  if(travado || carta.classList.contains('virada')) return
  carta.classList.add('virada')

  if(!primeira){
    primeira={carta,id}
  }else{
    segunda={carta,id}
    travado=true

    if(primeira.id===segunda.id){
      primeira=null
      segunda=null
      travado=false
    }else{
      setTimeout(()=>{
        primeira.carta.classList.remove('virada')
        segunda.carta.classList.remove('virada')
        primeira=null
        segunda=null
        travado=false
      },800)
    }
  }
}

function virarDificil(carta,c){
  if(travado || carta.classList.contains('virada')) return
  carta.classList.add('virada')

  if(!primeira){
    primeira={carta,c}
  }else{
    segunda={carta,c}
    travado=true

    if(primeira.c.id===segunda.c.id){
      pontos += primeira.c.pontos
      primeira=null
      segunda=null
      travado=false
    }else{
      setTimeout(()=>{
        primeira.carta.classList.remove('virada')
        segunda.carta.classList.remove('virada')
        primeira=null
        segunda=null
        travado=false
      },800)
    }
  }
}

function resetarRank(){
  let senha = prompt("Digite a senha:")
  if(senha === "rafael15"){
    localStorage.removeItem("rank")
    carregarRank()
    alert("Ranking apagado!")
  }else{
    alert("Senha incorreta!")
  }
}

function salvarRank(nome, pontos){
  let rank = JSON.parse(localStorage.getItem("rank")) || []

  let jogador = rank.find(j => j.nome === nome)

  if(!jogador){
    jogador = { nome:nome, pontos:0 }
    rank.push(jogador)
  }

  if(pontos > jogador.pontos){
    jogador.pontos = pontos
  }

  rank.sort((a,b)=> b.pontos - a.pontos || a.nome.localeCompare(b.nome))

  localStorage.setItem("rank", JSON.stringify(rank))
  carregarRank()
}

function carregarRank(){
  let rank = JSON.parse(localStorage.getItem("rank")) || []
  let tabela = document.getElementById("rankTable")

  tabela.innerHTML = "<tr><th>Jogador</th><th>Pontos</th></tr>"

  rank.forEach(j=>{
    let l=document.createElement("tr")
    l.innerHTML=`<td>${j.nome}</td><td>${j.pontos}</td>`
    tabela.appendChild(l)
  })
}

carregarRank()
</script>

</body>
</html>
